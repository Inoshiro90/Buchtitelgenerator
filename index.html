        <!-- ===== RESULTS AREA ===== -->
        <div class="results-area">

          <!-- Controls -->
          <div class="controls-section">
            <div class="controls-row">
              <div class="form-group">
                <label class="form-label" for="input-field-book-count">Anzahl</label>
                <input type="number" class="form-input" id="input-field-book-count" min="1" max="1000" value="1"
                  onKeyUp="if(this.value>1000){this.value='1000';} else if(this.value<0){this.value='0';}">
              </div>
              <div class="action-buttons">
                <button id="btn-generate" class="btn btn-blue">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-play-icon lucide-play">
                    <path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z" />
                  </svg>
                  Generieren
                </button>
                <button id="btn-copy" class="btn btn-secondary">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" />
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                  </svg>
                  Kopieren
                </button>
                <button id="btn-clear" class="btn btn-secondary">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                    <path d="M10 11v6M14 11v6" />
                  </svg>
                  Löschen
                </button>
              </div>
            </div>
          </div>

              <span class="results-count" id="results-count"></span>

            <div class="results-empty" id="results-empty">
              <span class="results-empty-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"

                  stroke-linejoin="round" class="lucide lucide-book-open-text-icon lucide-book-open-text">
                  <path d="M12 7v14" />
                  <path d="M16 12h2" />
                  <path d="M16 8h2" />

                  <path d="M6 12h2" />
                  <path d="M6 8h2" />
                </svg></span>
              <p class="results-empty-text">Noch keine Bücher generiert.<br>Wähle deine Filter und klicke auf
                „Generieren".</p>
            </div>

            <div id="container-generated-books"></div>
          </div>

        </div><!-- /.results-area -->
      </div><!-- /.main-layout -->
    </div><!-- /.container -->
