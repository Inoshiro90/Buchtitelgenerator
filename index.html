<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buchgenerator</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles/main.css">

  <!-- Einziger Script-Einstiegspunkt — lädt alle Module dynamisch -->
  <script type="module" src="core/loader.js"></script>
</head>

<body>

  <!-- ===== NAVBAR ===== -->
  <header class="app-nav">
    <div class="nav-brand">
      <div class="nav-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 7v14"/>
          <path d="M16 12h2"/><path d="M16 8h2"/>
          <path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/>
          <path d="M6 12h2"/><path d="M6 8h2"/>
        </svg>
      </div>
      Buchgenerator
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="Dark Mode umschalten">
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ===== HERO ===== -->
  <section class="hero-section">
    <div class="container">
      <h1 class="hero-title">Buchgenerator</h1>
      <p class="hero-desc">Generiere zufällige Bücher für deine Kampagne mit Titeln, Autoren und detaillierten Beschreibungen.</p>
    </div>
  </section>

  <!-- ===== MAIN ===== -->
  <main class="main-content">
    <div class="container">
      <div class="main-layout">

        <!-- ===== FILTER SIDEBAR ===== -->
        <aside class="filter-sidebar">
          <div class="filter-sidebar-header">
            <div class="filter-sidebar-title">Filter</div>
            <div class="filter-sidebar-subtitle">Einstellungen anpassen</div>
          </div>

          <!-- Panel: Setting -->
          <div class="filter-panel is-closed" id="panel-setting">
            <div class="filter-panel-header" data-panel="panel-setting">
              <span class="filter-panel-label">Setting</span>
              <svg class="filter-panel-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
            </div>
            <div class="filter-panel-body">
              <div class="checkbox-grid checkbox-grid-single">
                <label class="form-check"><input type="checkbox" class="checkbox-setting" data-value="Drachenlanze" checked><span class="form-check-label">Drachenlanze</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-setting" data-value="Eberron" checked><span class="form-check-label">Eberron</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-setting" data-value="Exandria" checked><span class="form-check-label">Exandria</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-setting" data-value="Greyhawk" checked><span class="form-check-label">Greyhawk</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-setting" data-value="Ravenloft" checked><span class="form-check-label">Ravenloft</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-setting" data-value="Ravnica" checked><span class="form-check-label">Ravnica</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-setting" data-value="Spelljammer" checked><span class="form-check-label">Spelljammer</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-setting" data-value="Strixhaven" checked><span class="form-check-label">Strixhaven</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-setting" data-value="Theros" checked><span class="form-check-label">Theros</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-setting" data-value="Vergessene Reiche" checked><span class="form-check-label">Vergessene Reiche</span></label>
              </div>
              <div class="filter-panel-actions">
                <button class="btn btn-ghost" id="btn-select-all-setting">Alle</button>
                <button class="btn btn-ghost" id="btn-deselect-all-setting">Keine</button>
              </div>
            </div>
          </div>

          <!-- Panel: Genre -->
          <div class="filter-panel is-closed" id="panel-genre">
            <div class="filter-panel-header" data-panel="panel-genre">
              <span class="filter-panel-label">Genre</span>
              <svg class="filter-panel-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
            </div>
            <div class="filter-panel-body">
              <div class="checkbox-grid">
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Belletristik" checked><span class="form-check-label">Belletristik</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Biographie" checked><span class="form-check-label">Biographie</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Freizeit" checked><span class="form-check-label">Freizeit</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Geographie" checked><span class="form-check-label">Geographie</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Geschichte" checked><span class="form-check-label">Geschichte</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Handwerk" checked><span class="form-check-label">Handwerk</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Heilkunde" checked><span class="form-check-label">Heilkunde</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Kinderbuch" checked><span class="form-check-label">Kinderbuch</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Kochkunst" checked><span class="form-check-label">Kochkunst</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Bildende Kunst" checked><span class="form-check-label">Bildende Kunst</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Darstellende Kunst" checked><span class="form-check-label">Darst. Kunst</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Magie" checked><span class="form-check-label">Magie</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Naturkunde" checked><span class="form-check-label">Naturkunde</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Philosophie" checked><span class="form-check-label">Philosophie</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Psychologie" checked><span class="form-check-label">Psychologie</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Recht" checked><span class="form-check-label">Recht</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Religion" checked><span class="form-check-label">Religion</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Sport" checked><span class="form-check-label">Sport</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Sprache" checked><span class="form-check-label">Sprache</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-genre" data-value="Völkerkunde" checked><span class="form-check-label">Völkerkunde</span></label>
              </div>
              <div class="filter-panel-actions">
                <button class="btn btn-ghost" id="btn-select-all-genre">Alle</button>
                <button class="btn btn-ghost" id="btn-deselect-all-genre">Keine</button>
              </div>
            </div>
          </div>

          <!-- Panel: Beschreibung -->
          <div class="filter-panel is-closed" id="panel-description">
            <div class="filter-panel-header" data-panel="panel-description">
              <span class="filter-panel-label">Beschreibung</span>
              <svg class="filter-panel-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
            </div>
            <div class="filter-panel-body">
              <div class="checkbox-grid">
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Autor" checked><span class="form-check-label">Autor</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Seitenanzahl" checked><span class="form-check-label">Seitenzahl</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Auflage" checked><span class="form-check-label">Auflage</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Alter" checked><span class="form-check-label">Alter</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Sprache" checked><span class="form-check-label">Sprache</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Schlagwörter" checked><span class="form-check-label">Schlagwörter</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Buchgröße" checked><span class="form-check-label">Buchgröße</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Seitenmaterial" checked><span class="form-check-label">Seitenmaterial</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Gewicht" checked><span class="form-check-label">Gewicht</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Buchzustand" checked><span class="form-check-label">Buchzustand</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Buchbindung" checked><span class="form-check-label">Buchbindung</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Buchwert" checked><span class="form-check-label">Buchwert</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Material des Einbands" checked><span class="form-check-label">Einband-Material</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Farbe des Einbands" checked><span class="form-check-label">Einband-Farbe</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Detail des Einbands" checked><span class="form-check-label">Einband-Detail</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Textqualität" checked><span class="form-check-label">Textqualität</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Produktionsart des Texts" checked><span class="form-check-label">Produktionsart</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Anzahl der Bilder" checked><span class="form-check-label">Bilder-Anzahl</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Qualität der Bilder" checked><span class="form-check-label">Bilder-Qualität</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Größe der Bilder" checked><span class="form-check-label">Bilder-Größe</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Farbe der Bilder" checked><span class="form-check-label">Bilder-Farbe</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Stil der Bilder" checked><span class="form-check-label">Bilder-Stil</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Lesezeichen" checked><span class="form-check-label">Lesezeichen</span></label>
                <label class="form-check"><input type="checkbox" class="checkbox-field" data-value="Eigenart" checked><span class="form-check-label">Eigenart</span></label>
              </div>
              <div class="filter-panel-actions">
                <button class="btn btn-ghost" id="btn-select-all-field">Alle</button>
                <button class="btn btn-ghost" id="btn-deselect-all-field">Keine</button>
              </div>
            </div>
          </div>
        </aside>

        <!-- ===== RESULTS AREA ===== -->
        <div class="results-area">

          <!-- Controls -->
          <div class="controls-section">
            <div class="controls-row">
              <div class="form-group">
                <label class="form-label" for="input-field-book-count">Anzahl</label>
                <input type="number" class="form-input" id="input-field-book-count"
                       min="1" max="1000" value="1">
              </div>
              <div class="action-buttons">
                <button id="btn-generate" class="btn btn-blue" disabled>
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                       fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/>
                  </svg>
                  Generieren
                </button>
                <button id="btn-copy" class="btn btn-secondary">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                  </svg>
                  Kopieren
                </button>
                <button id="btn-clear" class="btn btn-secondary">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                    <path d="M10 11v6M14 11v6"/>
                  </svg>
                  Löschen
                </button>
              </div>
            </div>
          </div>

          <!-- Results -->
          <div class="results-section">
            <div class="results-header">
              <h2 class="results-title">Generierte Bücher</h2>
              <span class="results-count" id="results-count"></span>
            </div>

            <div class="results-empty" id="results-empty">
              <span class="results-empty-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 7v14"/>
                  <path d="M16 12h2"/><path d="M16 8h2"/>
                  <path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/>
                  <path d="M6 12h2"/><path d="M6 8h2"/>
                </svg>
              </span>
              <p class="results-empty-text">
                Noch keine Bücher generiert.<br>
                Wähle deine Filter und klicke auf „Generieren".
              </p>
            </div>

            <div id="container-generated-books"></div>
          </div>

        </div><!-- /.results-area -->
      </div><!-- /.main-layout -->
    </div><!-- /.container -->
  </main>

  <!-- Back to top -->
  <button type="button" id="btn-back-to-top" aria-label="Nach oben scrollen">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>

</body>
</html>
