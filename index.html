  <!-- ===== UI SCRIPTS ===== -->
  <script>
    // Dark Mode Toggle
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) html.setAttribute('data-theme', savedTheme);

    themeToggle.addEventListener('click', () => {
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // Accordion panels
    document.querySelectorAll('.filter-panel-header').forEach(header => {
      header.addEventListener('click', () => {
        const panelId = header.getAttribute('data-panel');
        const panel = document.getElementById(panelId);
        panel.classList.toggle('is-open');
      });
    });

    // Back to top visibility
    window.addEventListener('scroll', () => {
      const btn = document.getElementById('btn-back-to-top');
      if (window.scrollY > 300) btn.classList.add('visible');
      else btn.classList.remove('visible');
    });

    // Results empty state management
    const origDisplayGeneratedBooks = window.displayGeneratedBooks;
    const containerObserver = new MutationObserver(() => {
      const container = document.getElementById('container-generated-books');
      const empty = document.getElementById('results-empty');
      const countEl = document.getElementById('results-count');
      const cards = container ? container.children.length : 0;
      if (empty) empty.style.display = cards > 0 ? 'none' : 'block';
      if (countEl) countEl.textContent = cards > 0 ? cards + ' Ergebnis' + (cards !== 1 ? 'se' : '') : '';
    });
    window.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('container-generated-books');
      if (container) containerObserver.observe(container, { childList: true });
    });
  </script>

  <!-- Patch displayGeneratedBooks to use ds-card markup -->
  <script>
    (function () {
      const _orig = window.displayGeneratedBooks;
      window.displayGeneratedBooks = function (generatedBooks, selectedDescription) {
        if (typeof selectedGenre !== 'undefined' && selectedGenre.length === 0) return;

        const container = document.getElementById('container-generated-books');
        container.innerHTML = '';

        generatedBooks.forEach(function (book) {
          const card = document.createElement('div');
          card.className = 'ds-card';

          let metaRows = '';

          if (selectedDescription.includes('Autor')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Autor</span><span class="card-meta-value">${book.author.first_name} ${book.author.last_name}, ${book.author.gender}er ${book.author.race}</span></div>`;
          }
          if (selectedDescription.includes('Seitenanzahl')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Seitenanzahl</span><span class="card-meta-value">${book.description.page_count} Seiten</span></div>`;
          }
          if (selectedDescription.includes('Auflage')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Auflage</span><span class="card-meta-value">${book.description.book_edition}</span></div>`;
          }
          if (selectedDescription.includes('Alter')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Alter</span><span class="card-meta-value">${book.description.book_age}</span></div>`;
          }
          if (selectedDescription.includes('Sprache')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Sprache</span><span class="card-meta-value">${book.description.book_language}</span></div>`;
          }
          if (selectedDescription.includes('Schlagwörter')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Schlagwörter</span><span class="card-meta-value">${book.book_tags}</span></div>`;
          }
          if (selectedDescription.includes('Buchgröße')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Buchgröße</span><span class="card-meta-value">${book.description.book_size.height} × ${book.description.book_size.length} × ${book.description.book_size.width} cm</span></div>`;
          }
          if (selectedDescription.includes('Seitenmaterial')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Seitenmaterial</span><span class="card-meta-value">${book.description.page_material}</span></div>`;
          }
          if (selectedDescription.includes('Gewicht')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Gewicht</span><span class="card-meta-value">${book.description.book_weight.gram} g / ~${book.description.book_weight.pound} lb</span></div>`;
          }
          if (selectedDescription.includes('Buchzustand')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Buchzustand</span><span class="card-meta-value">${book.description.book_condition}</span></div>`;
          }
          if (selectedDescription.includes('Buchbindung')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Buchbindung</span><span class="card-meta-value">${book.description.book_binding}</span></div>`;
          }
          if (selectedDescription.includes('Buchwert')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Buchwert</span><span class="card-meta-value">${book.description.book_value} Goldmünzen</span></div>`;
          }
          if (selectedDescription.includes('Material des Einbands')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Einband</span><span class="card-meta-value">${book.description.cover.material}</span></div>`;
          }
          if (selectedDescription.includes('Farbe des Einbands')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Einbandfarbe</span><span class="card-meta-value">${book.description.cover.color.name} <span class="card-color-swatch" style="background-color:${book.description.cover.color.hex}"></span></span></div>`;
          }
          if (selectedDescription.includes('Detail des Einbands')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Einbanddetail</span><span class="card-meta-value">${book.description.cover.detail}</span></div>`;
          }
          if (selectedDescription.includes('Textqualität')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Textqualität</span><span class="card-meta-value">${book.description.text_quality}</span></div>`;
          }
          if (selectedDescription.includes('Produktionsart des Texts')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Produktion</span><span class="card-meta-value">${book.description.text_production}</span></div>`;
          }
          if (selectedDescription.includes('Anzahl der Bilder')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Bilder</span><span class="card-meta-value">${book.description.image.number}</span></div>`;
          }
          if (selectedDescription.includes('Qualität der Bilder')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Bildqualität</span><span class="card-meta-value">${book.description.image.quality}</span></div>`;
          }
          if (selectedDescription.includes('Größe der Bilder')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Bildgröße</span><span class="card-meta-value">${book.description.image.size}</span></div>`;
          }
          if (selectedDescription.includes('Farbe der Bilder')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Bildfarbe</span><span class="card-meta-value">${book.description.image.color}</span></div>`;
          }
          if (selectedDescription.includes('Stil der Bilder')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Bildstil</span><span class="card-meta-value">${book.description.image.style}</span></div>`;
          }
          if (selectedDescription.includes('Lesezeichen')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Lesezeichen</span><span class="card-meta-value">${book.description.bookmark}</span></div>`;
          }
          if (selectedDescription.includes('Eigenart')) {
            metaRows += `<div class="card-meta-row"><span class="card-meta-key">Eigenart</span><span class="card-meta-value">${book.description.quirk}</span></div>`;
          }

          card.innerHTML = `
            <div class="card-spine"></div>
            <div class="card-body">
            <div class="card-title">${book.title}</div>
            ${metaRows ? `<div class="card-meta">${metaRows}</div>` : ''}
            </div>
          `;

          container.appendChild(card);
        });
      };
    })();
  </script>
